name: Publish to PyPI and Docker Hub

on:
  workflow_dispatch:

jobs:
  bump-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install uv
      uses: astral-sh/setup-uv@v2

    - name: Bump patch version
      id: bump
      run: |
        # Read current version from pyproject.toml
        CURRENT=$(python - <<'EOF'
        import re
        with open("pyproject.toml") as f:
            content = f.read()
        m = re.search(r'^version\s*=\s*"([^"]+)"', content, re.MULTILINE)
        print(m.group(1))
        EOF
        )
        echo "Current version: $CURRENT"

        # Bump patch number
        NEW=$(python - "$CURRENT" <<'EOF'
        import sys
        parts = sys.argv[1].split(".")
        parts[-1] = str(int(parts[-1]) + 1)
        print(".".join(parts))
        EOF
        )
        echo "New version: $NEW"

        # Update pyproject.toml
        sed -i "s/^version = \"$CURRENT\"/version = \"$NEW\"/" pyproject.toml

        # Update version string in server.py
        sed -i "s/version='futu-stock-mcp-server [^']*'/version='futu-stock-mcp-server $NEW'/" src/futu_stock_mcp_server/server.py

        echo "current=$CURRENT" >> $GITHUB_OUTPUT
        echo "new=$NEW" >> $GITHUB_OUTPUT

    - name: Build package
      run: |
        uv pip install --system build
        python -m build

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}

    - name: Commit version bump and push tag
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add pyproject.toml src/futu_stock_mcp_server/server.py
        git commit -m "chore: bump version to ${{ steps.bump.outputs.new }}"
        git tag "v${{ steps.bump.outputs.new }}"
        git push origin HEAD
        git push origin "v${{ steps.bump.outputs.new }}"

  publish-docker:
    runs-on: ubuntu-latest
    needs: bump-and-publish
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.ref }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Get new version
      id: version
      run: |
        VER=$(python - <<'EOF'
        import re
        with open("pyproject.toml") as f:
            content = f.read()
        m = re.search(r'^version\s*=\s*"([^"]+)"', content, re.MULTILINE)
        print(m.group(1))
        EOF
        )
        echo "version=$VER" >> $GITHUB_OUTPUT

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/futu-stock-mcp-server:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/futu-stock-mcp-server:${{ steps.version.outputs.version }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
